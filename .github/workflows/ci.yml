name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install
        run: uv sync --group dev

      - name: Ruff
        run: uv run ruff check agent_fleet tests integrations

      - name: Pytest
        run: uv run pytest -q
