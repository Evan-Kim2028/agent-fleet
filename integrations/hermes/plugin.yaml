name: cursor-fleet
version: 0.2.0
description: Agent Fleet — parallel scoped coding personas with review pipelines
requires_env:
  - name: CURSOR_API_KEY
    description: Cursor API key from dashboard Integrations
    url: https://cursor.com/dashboard/integrations
    secret: true
provides_tools:
  - coding_fleet_dispatch
  - coding_fleet_list_personas
  - coding_fleet_pr_review
  - coding_fleet_pr_loop
  - coding_fleet_scope
