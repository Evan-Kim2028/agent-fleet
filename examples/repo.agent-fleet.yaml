# Repo integration
name: my-project
default_persona: coder
default_branch: main

# Optional: isolated worktree per run (default: edit in-place)
# use_worktree: true
# worktree_base: /tmp/agent-fleet-worktrees

# Repo-local personas (overrides global fleet.yaml personas_dir)
# personas_dir: default_personas

# Verification commands run after IMPLEMENT (any failure triggers retry)
test_command: pytest -q
lint_command: ruff check .
# typecheck_command: mypy .

# Or explicit list:
# verify_commands:
#   - npm test
#   - npm run lint

# Persona scope restrictions (path prefixes)
persona_scope_allowlist:
  backend:
    - backend/
    - api/
  frontend:
    - frontend/
    - src/

# Cross-cutting boundaries — planner forces decomposition when scope spans groups
cross_cutting_groups:
  - [frontend/, backend/]
  - [frontend/, api/]

# Protected paths agents must not modify
critical_path_prefixes:
  - .github/workflows/
  - ops/

# Optional spine overrides (advanced)
# spine:
#   branch_prefix: fleet
#   worktree_base: /tmp/agent-fleet-worktrees

# Automated PR lifecycle (requires pr-analyzer workflow + local watcher)
# pr_loop:
#   enabled: true
#   branch_prefixes: [fleet/]
#   poll_interval_s: 30
#   auto_merge: true
#   max_fix_attempts: 2
#   max_ci_fix_attempts: 2
#   merge_cooldown_s: 300
#   tiered_merge_gate: false
#   poll_interval_s: 10
#   review_poll_s: 10
#   ci_poll_s: 10
#   fix_persona: coder
