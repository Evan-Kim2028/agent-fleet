# Global agent fleet config
# Preferred location: ~/.agent-fleet/fleet.yaml
# Copy to ~/.agent-fleet/fleet.yaml (see docs/FLEET-CONFIG.md)
# See docs/FLEET-CONFIG.md for paths, personas_dir rules, and import-shadow checks.

# Default backend: cursor (Cursor SDK) or kimi (Kimi Code CLI)
default_backend: cursor
# composer-2.5 maps to the slow (non-fast) Cursor tier — agent-fleet
# explicitly sends {fast=false} so you don't get silently routed to the
# cheaper-quality fast variant. Use `composer-2.5-fast` to opt in.
default_model: composer-2.5
default_mode: agent
default_persona: coder
max_parallel: 3
timeout_seconds: 900
default_pipeline: simple

# --- Hard-failure redispatch (v0.5.0) ---
# Number of automatic retries when a task ends in a hard failure (error/expired/timeout/
# scope_violation). 1 = one retry, two total attempts. 0 disables.
# Override per-run with: fleet run ... --max-redispatches N
# Recommended: 0 in CI (fail fast), 1-2 in interactive use.
max_redispatches: 1

# --- Optional: Kimi Code CLI execution backend ---
# Requires: pip install not needed; install kimi-cli from Kimi Code
# export KIMI_API_KEY=sk-kimi-...   # https://platform.kimi.ai
# default_backend: kimi
# default_model: kimi-for-coding
# kimi_bin: ~/.local/bin/kimi-cli

# personas_dir — bundled personas ship in the installed package (agent_fleet/personas/).
# Leave UNSET in this global file so fleet uses the package defaults.
# Relative paths here resolve against this config directory (~/.agent-fleet/) — usually wrong.
# For repo-local personas, set personas_dir in .agent-fleet.yaml (relative to repo root).
# Global override only with an absolute path to a custom persona tree:
# personas_dir: /absolute/path/to/my/personas

# --- MCP server catalog (v0.5.0) ---
# Named MCP servers that personas can opt into via mcp_servers: [name, ...].
# ${VAR} syntax is expanded from the environment at config-load time.
# Missing env vars cause a startup error with the variable name in the message.
#
# Uncomment the servers you want to use and set the required env vars:
#   export CONTEXT7_KEY=your_context7_api_key
#
# mcp_servers:
#   playwright:
#     type: stdio
#     command: npx
#     args: ["-y", "@playwright/mcp@latest"]
#
#   chrome_devtools:
#     type: stdio
#     command: npx
#     args: ["-y", "@modelcontextprotocol/server-chrome-devtools@latest"]
#     # TODO: confirm exact npm package name for Chrome DevTools MCP
#
#   context7:
#     type: http
#     url: https://mcp.context7.com/mcp
#     headers:
#       Authorization: "Bearer ${CONTEXT7_KEY}"
#
#   serena:
#     type: stdio
#     command: uvx
#     args: ["--from", "git+https://github.com/oraios/serena", "serena-mcp-server"]

personas:
  coder:
    prompt: coder.md
    # mcp_servers: [playwright, context7]   # uncomment after enabling mcp_servers above
  reviewer:
    prompt: reviewer.md
    # mcp_servers: [context7]               # uncomment after enabling mcp_servers above
  pr-analyzer:
    prompt: pr-analyzer.md
    model: composer-2.5
    mode: plan
  product-scout:
    prompt: product-scout.md
    mode: plan
  tech-scout:
    prompt: tech-scout.md
    mode: plan

# code_review auto_fix is repo-level (.agent-fleet.yaml), not global fleet.yaml.
# Default: auto_fix=false. When pr_loop.enabled with no code_review section, inherits
# auto_fix=true, auto_push=true, auto_pr_loop=true. See examples/repo-full.agent-fleet.yaml.

pipelines:
  simple:
    - execute
  code_review:
    - execute
    - review
  pr_review:
    - analyze
  scout:
    - product_scout
    - tech_scout
    - synthesize_scout
  full:
    - plan
    - research
    - synthesize
    - implement
    - verify
    - review
